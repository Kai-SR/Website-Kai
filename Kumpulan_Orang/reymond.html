        width: 95%;
        background-color: lime;
        border: 2px solid yellow;
        box-shadow: 0 0 12px gold;
        border-radius: 5px;
        transform: scale(1.01);
        transition: 1.5s;
    }
    
    .kotak-profil:hover {
        margin-top: 12px;
        width: 95%;
        background-color: lime;
        border: 2px solid gold;
        box-shadow: 0 0 15px gold;
        border-radius: 5px;
        transform: scale(1.01);transition: 1.5s;

        height: 100px;
        width: 100px;
        border-radius: 100%;
        border: 3px solid yellow;
        box-shadow: 0 0 12px yellow;
        display: block;
        margin: 0 auto;
        margin-top: 12px;
        transition: 1.2s;
    }
    
    .gambar-profil:hover {
        height: 100px;
        width: 100px;
        border-radius: 100%;
        border: 3px solid gold;
        box-shadow: 0 0 15px gold;

        margin: 0 auto;
        margin-top: 12px;
        transform: scale(1.1);
        transition: 1.2s;

        font-weight: bold;
